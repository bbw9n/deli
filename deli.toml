[[workspaces]]
name = "local"
root = "."

[[document_providers]]
name = "docs"
[document_providers.command]
program = "sh"
args = ["preview/providers/docs.sh"]

[[config_providers]]
name = "config"
[config_providers.command]
program = "sh"
args = ["preview/providers/configs.sh"]

[[monitor_providers]]
name = "monitor"
[monitor_providers.command]
program = "sh"
args = ["preview/providers/metrics.sh"]

[ui]
refresh_seconds = 30
