[[workspaces]]
name = "local"
root = "."

[[document_providers]]
name = "docs"
[document_providers.command]
program = "sh"
args = ["preview/providers/docs.sh"]

[[config_providers]]
name = "config"
[config_providers.command]
program = "sh"
args = ["preview/providers/configs.sh"]

[[monitor_providers]]
name = "monitor"
kind = "command"
query = "avg(rate(container_cpu_usage_seconds_total[5m]))"
query_presets = [
  "avg(rate(container_cpu_usage_seconds_total[5m]))",
  "sum(rate(http_requests_total[5m]))",
  "histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket[5m])) by (le))",
]
[monitor_providers.command]
program = "sh"
args = ["preview/providers/metrics.sh", "{{query}}"]

[[service_providers]]
name = "services"
[service_providers.command]
program = "sh"
args = ["preview/providers/services.sh"]

[ui]
refresh_seconds = 30
